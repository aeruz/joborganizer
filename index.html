<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimTrack - Unified Manager</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.8/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4B5563; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        body { 
            background-color: #030712; 
            color: #f3f4f6; 
            overflow: hidden; 
            overscroll-behavior: none; 
            font-family: system-ui, -apple-system, sans-serif; 
        }

        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .editor-content ul { list-style-type: disc; margin-left: 1.25rem; }
        .editor-content ol { list-style-type: decimal; margin-left: 1.25rem; }
        .editor-content b { font-weight: bold; }
        .editor-content i { font-style: italic; }
        
        /* Draggable Range Styling with Fill Support */
        input[type="range"] { 
            -webkit-appearance: none; 
            background: #1f2937; 
            cursor: pointer; 
            width: 100%; 
            height: 6px; 
            border-radius: 99px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-runnable-track { 
            background: transparent; 
            height: 6px; 
            border-radius: 99px; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            height: 16px; 
            width: 16px; 
            background: #3b82f6; 
            border-radius: 50%; 
            margin-top: -5px; 
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
            position: relative;
            z-index: 2;
        }
        input[type="range"]:active::-webkit-slider-thumb { transform: scale(1.2); }
        
        /* Tablet Support */
        @media (max-width: 1024px) {
            .tablet-scroll { overflow-y: auto !important; height: auto !important; max-height: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        // Reverted to original verified icons to prevent module crash
        import { 
            Plus, DollarSign, Clock, CheckCircle, Box, Calendar, Edit2, 
            Trash2, X, Save, TrendingUp, CreditCard, Briefcase, 
            ChevronLeft, ChevronRight, Filter, Settings, 
            Layers, ArrowRight, Download, Upload, FileJson, LayoutGrid, CalendarDays,
            BarChart2, Target, Star, Folder, RotateCcw, Bold, Italic, Underline, 
            List, ListOrdered, Eye, EyeOff, Type, Highlighter, Eraser, Minus, Umbrella, Flag,
            Zap, AlertCircle, PieChart, Activity
        } from 'lucide-react';

        // --- GITHUB CLOUD SYNC SETTINGS ---
        const GIST_FILENAME = 'animtrack_data.json';
        const LOCAL_GIST_KEY = 'animtrack_gist_id';
        const GITHUB_TOKEN_KEY = 'animtrack_gh_token'; 
        const STORAGE_KEY = 'animtrack_db_v27'; 

        // --- SAFE STORAGE WRAPPERS (Prevents Safari crashes) ---
        const safeGetStorage = (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } };
        const safeSetStorage = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };
        const safeRemoveStorage = (key) => { try { localStorage.removeItem(key); } catch(e) {} };
        
        const FONTS = [
            { label: 'Default UI', value: 'system-ui, -apple-system, sans-serif' },
            { label: 'Google Sans', value: '"Product Sans", "Segoe UI", Roboto, Arial, sans-serif' },
            { label: 'Arial', value: 'Arial, sans-serif' },
            { label: 'Verdana', value: 'Verdana, sans-serif' },
            { label: 'Monospace', value: 'monospace' }
        ];

        const STATUS_FLOW = ['inquiry', 'layout', 'blocking', 'splining', 'polishing', 'revision', 'completed', 'paid'];

        const getStatusStyles = (status) => {
            switch(status) {
                case 'layout': return 'bg-cyan-900/30 text-cyan-400 border-cyan-800';
                case 'blocking': return 'bg-blue-900/30 text-blue-400 border-blue-800';
                case 'splining': return 'bg-indigo-900/30 text-indigo-400 border-indigo-800';
                case 'polishing': return 'bg-purple-900/30 text-purple-400 border-purple-800';
                case 'revision': return 'bg-yellow-900/40 text-yellow-400 border-yellow-700';
                case 'completed': return 'bg-yellow-900/30 text-yellow-500 border-yellow-800';
                case 'paid': return 'bg-emerald-900/30 text-emerald-500 border-emerald-800';
                default: return 'bg-gray-800 text-gray-400 border-gray-700';
            }
        };

        const parseLocalDate = (dStr) => {
            if (!dStr) return null;
            if (dStr instanceof Date) return dStr;
            const str = String(dStr);
            if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
                const [y, m, d] = str.split('-').map(Number);
                return new Date(y, m - 1, d);
            }
            const parsed = new Date(str);
            return isNaN(parsed.getTime()) ? null : parsed;
        };

        const formatDate = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const calculateTicketValue = (p, clients = []) => {
            const client = (clients || []).find(c => c.name === p.client);
            if (client?.mode === 'fixed') return parseFloat(client.defaultRate || 0);
            return (parseFloat(p.shotRate || 0) * (parseFloat(p.shotCount) || 1));
        };

        // --- DATA SYNC LOGIC ---

        const loadLocalData = () => {
            try {
                const saved = safeGetStorage(STORAGE_KEY);
                if (saved) {
                    const p = JSON.parse(saved);
                    return {
                        projects: Array.isArray(p.projects) ? p.projects : [],
                        clients: Array.isArray(p.clients) ? p.clients : [],
                        holidays: Array.isArray(p.holidays) ? p.holidays : [],
                        leaves: Array.isArray(p.leaves) ? p.leaves : [],
                        totalLeaves: p.totalLeaves ?? 22,
                        lastUpdated: p.lastUpdated || Date.now()
                    };
                }
            } catch (e) { console.error("Local load error", e); }
            return { projects: [], clients: [], holidays: [], leaves: [], totalLeaves: 22, lastUpdated: Date.now() };
        };

        const saveLocalData = (data) => {
            try { safeSetStorage(STORAGE_KEY, JSON.stringify(data)); } 
            catch (e) { console.error("Local save error", e); }
        };

        const fetchCloudData = async () => {
            const token = safeGetStorage(GITHUB_TOKEN_KEY);
            const gistId = safeGetStorage(LOCAL_GIST_KEY);
            if (token && gistId) {
                try {
                    // Added cache-busting timestamp to bypass GitHub's aggressive caching
                    const res = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, {
                        headers: { 
                            Authorization: `token ${token}`,
                            'Cache-Control': 'no-cache',
                            'Pragma': 'no-cache'
                        },
                        cache: 'no-store'
                    });
                    if (res.ok) {
                        const gist = await res.json();
                        const content = gist.files[GIST_FILENAME]?.content;
                        if (content) {
                            const p = JSON.parse(content);
                            return {
                                projects: Array.isArray(p.projects) ? p.projects : [],
                                clients: Array.isArray(p.clients) ? p.clients : [],
                                holidays: Array.isArray(p.holidays) ? p.holidays : [],
                                leaves: Array.isArray(p.leaves) ? p.leaves : [],
                                totalLeaves: p.totalLeaves ?? 22,
                                lastUpdated: p.lastUpdated || Date.now()
                            };
                        }
                    }
                } catch (e) { console.error("Cloud fetch failed, using local.", e); }
            }
            return null; 
        };

        let syncTimeout = null;
        const saveCloudData = (data) => {
            const dataToSave = { ...data, lastUpdated: Date.now() }; // Immutable timestamp update
            saveLocalData(dataToSave); // Always keep immediate local backup

            if (syncTimeout) clearTimeout(syncTimeout);
            
            // Debounce network requests
            syncTimeout = setTimeout(async () => {
                const token = safeGetStorage(GITHUB_TOKEN_KEY);
                if (!token) return;

                const gistId = safeGetStorage(LOCAL_GIST_KEY);
                const content = JSON.stringify(dataToSave, null, 2);
                
                try {
                    if (gistId) {
                        await fetch(`https://api.github.com/gists/${gistId}`, {
                            method: 'PATCH',
                            headers: { 
                                Authorization: `token ${token}`, 
                                'Content-Type': 'application/json' 
                            },
                            body: JSON.stringify({
                                description: "AnimTrack Cloud Backup",
                                files: { [GIST_FILENAME]: { content } }
                            })
                        });
                    } else {
                        const res = await fetch('https://api.github.com/gists', {
                            method: 'POST',
                            headers: { 
                                Authorization: `token ${token}`, 
                                'Content-Type': 'application/json' 
                            },
                            body: JSON.stringify({
                                description: "AnimTrack Cloud Backup",
                                public: false,
                                files: { [GIST_FILENAME]: { content } }
                            })
                        });
                        if (res.ok) {
                            const gist = await res.json();
                            safeSetStorage(LOCAL_GIST_KEY, gist.id);
                        }
                    }
                } catch(e) { console.error("Cloud push failed.", e); }
            }, 1500); 
        };

        // --- UI Components ---

        const StatCard = ({ title, value, icon: Icon, colorClass, subtext, onClick }) => (
            <div onClick={onClick} className={`bg-gray-900 border border-gray-800 p-4 rounded-3xl flex items-center space-x-4 shadow-lg hover:border-gray-700 transition cursor-pointer group relative overflow-hidden`}>
                <div className={`p-2 rounded-xl ${colorClass} bg-opacity-20`}><Icon className={colorClass.replace('bg-', 'text-')} size={20}/></div>
                <div className="z-10">
                    <p className="text-gray-500 text-[9px] font-black uppercase tracking-widest">{title}</p>
                    <h3 className="text-xl font-bold text-white">{value}</h3>
                    {subtext && <p className="text-[10px] text-gray-500 mt-0.5">{subtext}</p>}
                </div>
                <Icon className={`absolute -right-4 -bottom-4 w-20 h-20 opacity-5 ${colorClass.replace('bg-', 'text-')} transform -rotate-12 group-hover:scale-110 transition`} />
            </div>
        );

        const RichTextEditor = ({ value, onChange }) => {
            const editorRef = useRef(null);
            
            useEffect(() => {
                if (editorRef.current && value !== editorRef.current.innerHTML) {
                    if (document.activeElement !== editorRef.current) editorRef.current.innerHTML = value || '';
                }
            }, [value]);

            const exec = (cmd, val = null) => {
                document.execCommand(cmd, false, val);
                onChange(editorRef.current.innerHTML);
            };

            const handlePaste = (e) => {
                e.preventDefault();
                const text = e.clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            };

            const resetToDefault = () => {
                const sel = window.getSelection();
                if (!sel.rangeCount) return;
                const range = sel.getRangeAt(0);
                
                if (range.collapsed) {
                    const fullRange = document.createRange();
                    fullRange.selectNodeContents(editorRef.current);
                    sel.removeAllRanges();
                    sel.addRange(fullRange);
                }

                document.execCommand('foreColor', false, '#d1d5db');
                document.execCommand('fontName', false, FONTS[0].value);
                document.execCommand('fontSize', false, '3');
                document.execCommand('hiliteColor', false, 'transparent');
                document.execCommand('backColor', false, 'transparent'); 
                
                if (document.queryCommandState('bold')) document.execCommand('bold', false, null);
                if (document.queryCommandState('italic')) document.execCommand('italic', false, null);
                if (document.queryCommandState('underline')) document.execCommand('underline', false, null);

                sel.removeAllRanges();
                onChange(editorRef.current.innerHTML);
            };

            return (
                <div className="bg-gray-950 border border-gray-800 rounded-xl overflow-hidden flex flex-col h-[400px]">
                    <div className="flex flex-wrap items-center gap-1 p-2 bg-gray-900 border-b border-gray-800">
                        <div className="flex gap-0.5 bg-gray-950 p-1 rounded-lg border border-gray-800 mr-1">
                            <button onClick={()=>exec('bold')} className="p-1.5 hover:bg-gray-800 rounded text-gray-400"><Bold size={14}/></button>
                            <button onClick={()=>exec('italic')} className="p-1.5 hover:bg-gray-800 rounded text-gray-400"><Italic size={14}/></button>
                            <button onClick={()=>exec('underline')} className="p-1.5 hover:bg-gray-800 rounded text-gray-400"><Underline size={14}/></button>
                        </div>
                        <div className="flex gap-1 items-center bg-gray-950 p-1 rounded-lg border border-gray-800 mr-1 text-gray-400">
                            <input type="color" onChange={(e)=>exec('foreColor', e.target.value)} className="w-4 h-4 bg-transparent border-0 cursor-pointer" title="Font Color"/>
                            <input type="color" onChange={(e)=>exec('hiliteColor', e.target.value)} className="w-4 h-4 bg-transparent border-0 cursor-pointer" title="Highlight Color"/>
                        </div>
                        <select onChange={(e)=>exec('fontName', e.target.value)} className="bg-gray-950 text-[10px] p-1.5 rounded border border-gray-800 text-gray-300 outline-none w-24">
                            <option value="">Font...</option>
                            {FONTS.map(f=><option key={f.label} value={f.value}>{f.label}</option>)}
                        </select>
                        <select onChange={(e)=>exec('fontSize', e.target.value)} className="bg-gray-950 text-[10px] p-1.5 rounded border border-gray-800 text-gray-300 outline-none">
                            <option value="">Size...</option>
                            {[1,2,3,4,5,6,7].map(s=><option key={s} value={s}>{s}</option>)}
                        </select>
                        <button onClick={resetToDefault} className="p-1.5 hover:bg-red-900/20 text-gray-500 hover:text-red-400 rounded-lg ml-auto"><Eraser size={14}/></button>
                    </div>
                    <div 
                        ref={editorRef} 
                        className="editor-content p-4 outline-none text-sm text-gray-300 overflow-y-auto custom-scrollbar flex-1" 
                        contentEditable 
                        onPaste={handlePaste}
                        onInput={(e)=>onChange(e.target.innerHTML)} 
                    />
                </div>
            );
        };

        const CalendarBoard = ({ projects = [], currentDate, onEdit, holidays = [], leaves = [] }) => {
            const startM = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            const startD = new Date(startM); startD.setDate(startD.getDate() - startD.getDay());
            const endM = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
            const endD = new Date(endM); if (endD.getDay() !== 6) endD.setDate(endD.getDate() + (6 - endD.getDay()));
            const weeks = []; let dayIter = new Date(startD);
            while (dayIter <= endD || weeks.length < 5) { 
                let w = []; for(let i=0; i<7; i++){ w.push(new Date(dayIter)); dayIter.setDate(dayIter.getDate()+1); } 
                weeks.push(w); 
            }
            return (
                <div className="flex-1 overflow-auto custom-scrollbar bg-gray-900 border border-gray-800 rounded-2xl m-2 shadow-2xl">
                    <div className="grid grid-cols-7 border-b border-gray-800 sticky top-0 bg-gray-950 z-30">
                        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} className="text-[10px] font-bold text-gray-500 text-center py-2 uppercase tracking-widest">{d}</div>)}
                    </div>
                    {weeks.map((week, wIdx) => {
                        const weekStart = new Date(week[0]); weekStart.setHours(0,0,0,0);
                        const weekEnd = new Date(week[6]); weekEnd.setHours(23,59,59,999);
                        const weekProjects = (projects || []).filter(p => {
                            const s = parseLocalDate(p.startDate || p.createdAt); 
                            const e = parseLocalDate(p.deadline || p.startDate || p.createdAt);
                            if(!s || !e) return false;
                            s.setHours(0,0,0,0); e.setHours(23,59,59,999);
                            return s <= weekEnd && e >= weekStart;
                        }).sort((a,b) => parseLocalDate(a.startDate) - parseLocalDate(b.startDate));
                        return (
                            <div key={wIdx} className="relative border-b border-gray-800/50 group" style={{ minHeight: '120px' }}>
                                <div className="grid grid-cols-7 absolute inset-0 z-0 pointer-events-none">
                                    {week.map((day, dIdx) => {
                                        const isWeekend = dIdx === 0 || dIdx === 6;
                                        const isToday = day.toDateString() === new Date().toDateString();
                                        const isOtherMonth = day.getMonth() !== currentDate.getMonth();
                                        const holiday = (holidays || []).find(h => h.month === (day.getMonth()+1) && h.day === day.getDate());
                                        const leave = (leaves || []).find(l => { const s=parseLocalDate(l.startDate); const e=parseLocalDate(l.endDate || l.startDate); if(!s || !e) return false; s.setHours(0,0,0,0); e.setHours(23,59,59,999); return day >= s && day <= e; });
                                        return (
                                            <div key={dIdx} className={`border-r border-gray-800/30 p-2 ${isWeekend ? 'bg-gray-950/60' : ''} ${isToday ? 'bg-blue-500/5' : ''} ${holiday ? 'bg-yellow-500/10' : ''} ${leave ? 'bg-red-500/10' : ''}`}>
                                                <span className={`text-[10px] font-bold ${isToday ? 'text-blue-400' : 'text-gray-700'}`}>{day.getDate()}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="absolute inset-x-0 top-8 z-10 px-1 pointer-events-none">
                                    {weekProjects.map((p, pIdx) => {
                                        const s = parseLocalDate(p.startDate || p.createdAt);
                                        const e = parseLocalDate(p.deadline || p.startDate || p.createdAt);
                                        const startCol = Math.max(0, Math.floor((s.getTime() - weekStart.getTime()) / (1000 * 60 * 60 * 24)));
                                        const endCol = Math.min(6, Math.floor((e.getTime() - weekStart.getTime()) / (1000 * 60 * 60 * 24)));
                                        return (
                                            <div key={p.id} className="absolute pointer-events-auto mb-1" style={{ left: `${(startCol / 7) * 100}%`, width: `${((endCol - startCol + 1) / 7) * 100}%`, top: `${pIdx * 28}px`, height: '24px' }}>
                                                <button onClick={() => onEdit(p)} className={`w-full h-full text-[9px] font-bold text-white px-2 flex items-center truncate shadow-lg transition-all rounded-lg border-y border-gray-900/20 ${p.status === 'completed' ? 'bg-yellow-600 border-l-yellow-400' : p.status === 'paid' ? 'bg-emerald-600 border-l-emerald-400' : 'bg-blue-600 border-l-blue-400'}`}>
                                                    <span className="truncate">{p.name}</span>
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const StatisticsView = ({ projects = [], clients = [], leaves = [], totalLeaves, showRates }) => {
            const stats = useMemo(() => {
                const months = Array.from({length: 12}, (_, i) => ({ name: new Date(0, i).toLocaleString('default', {month:'short'}), earned: 0 }));
                const paidFixedTracker = new Set();
                let annualEarned = 0;
                let totalOverdueDays = 0;
                let overdueCount = 0;
                let revisionCount = 0;
                let onTimeCount = 0;
                const now = new Date();

                (projects || []).forEach(p => {
                    const client = (clients || []).find(c => c.name === p.client);
                    const isFixed = client?.mode === 'fixed';
                    const deadline = parseLocalDate(p.deadline);
                    const pDate = parseLocalDate(p.paymentDate || p.updatedAt || p.createdAt);
                    const compDate = parseLocalDate(p.completionDate || p.paymentDate || p.updatedAt);
                    
                    const isFinished = ['completed', 'paid'].includes(p.status);
                    const isRevision = p.status === 'revision';

                    if (deadline) {
                        if (!isFinished) {
                            if (isRevision) {
                                revisionCount++;
                            } else if (now > deadline) {
                                overdueCount++;
                                totalOverdueDays += Math.max(0, Math.floor((now - deadline) / (1000 * 60 * 60 * 24)));
                            } else {
                                onTimeCount++;
                            }
                        } else {
                            onTimeCount++;
                            if (compDate > deadline) {
                                totalOverdueDays += Math.max(0, Math.floor((compDate - deadline) / (1000 * 60 * 60 * 24)));
                            }
                        }
                    }

                    if (p.status === 'paid' && pDate && pDate.getFullYear() === new Date().getFullYear()) {
                        let val = 0;
                        if (isFixed) {
                            const monthKey = `${p.client}-${pDate.getMonth()}-${pDate.getFullYear()}`;
                            if (!paidFixedTracker.has(monthKey)) { val = parseFloat(client.defaultRate || 0); paidFixedTracker.add(monthKey); }
                        } else { val = (parseFloat(p.shotRate || 0) * (p.shotCount || 1)); }
                        months[pDate.getMonth()].earned += val;
                        annualEarned += val;
                    }
                });

                const totalForRatio = Math.max(1, onTimeCount + revisionCount + overdueCount);
                const complianceRatio = Math.round((onTimeCount / totalForRatio) * 100);

                return { months, annualTotal: annualEarned, totalOverdueDays, overdueCount, revisionCount, onTimeCount, complianceRatio };
            }, [projects, clients]);

            const maxEarned = Math.max(...stats.months.map(m => m.earned), 100);
            
            return (
                <div className="h-full p-6 overflow-y-auto custom-scrollbar bg-gray-950 space-y-8 pb-20">
                    <h2 className="text-2xl font-bold text-white flex items-center gap-3"><BarChart2 className="text-blue-500" size={32}/> Production Analytics</h2>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <StatCard title="Annual Earned" value={showRates ? `$${stats.annualTotal.toLocaleString()}` : '****'} icon={TrendingUp} colorClass="bg-emerald-500" />
                        <StatCard title="Compliance" value={`${stats.complianceRatio}%`} icon={Zap} colorClass="bg-blue-500" subtext="Achieved on-time" />
                        <StatCard title="Active Overdue" value={stats.overdueCount} icon={Clock} colorClass="bg-red-500" subtext={`${stats.totalOverdueDays}d total delay`} />
                        <StatCard title="In Revision" value={stats.revisionCount} icon={RotateCcw} colorClass="bg-yellow-500" />
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl">
                            <h3 className="text-xs font-black text-gray-500 uppercase tracking-widest mb-8 text-center">Work Distribution Gauge</h3>
                            <div className="relative h-8 w-full bg-gray-800 rounded-full overflow-hidden flex shadow-inner border border-gray-700">
                                <div className="h-full bg-blue-500 transition-all" style={{ width: `${(stats.onTimeCount / (stats.onTimeCount + stats.revisionCount + stats.overdueCount || 1)) * 100}%` }}/>
                                <div className="h-full bg-yellow-500 transition-all" style={{ width: `${(stats.revisionCount / (stats.onTimeCount + stats.revisionCount + stats.overdueCount || 1)) * 100}%` }}/>
                                <div className="h-full bg-red-500 transition-all" style={{ width: `${(stats.overdueCount / (stats.onTimeCount + stats.revisionCount + stats.overdueCount || 1)) * 100}%` }}/>
                            </div>
                            <div className="grid grid-cols-3 mt-8 text-center gap-4">
                                <div><p className="text-2xl font-black text-blue-400">{stats.onTimeCount}</p><p className="text-[9px] text-gray-500 uppercase font-black">Achieved</p></div>
                                <div><p className="text-2xl font-black text-yellow-500">{stats.revisionCount}</p><p className="text-[9px] text-gray-500 uppercase font-black">Revision</p></div>
                                <div><p className="text-2xl font-black text-red-500">{stats.overdueCount}</p><p className="text-[9px] text-gray-500 uppercase font-black">Overdue</p></div>
                            </div>
                        </div>
                        <div className="bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl">
                            <h3 className="text-xs font-black text-gray-500 uppercase tracking-widest mb-8 text-center">Revenue Pulse</h3>
                            <div className="h-32 w-full flex items-end justify-between gap-2">
                                {stats.months.map((m, i) => (
                                    <div key={i} className="flex-1 flex flex-col items-center group h-full justify-end">
                                        <div className="w-full bg-emerald-950 rounded-t-sm overflow-hidden relative h-full flex flex-col-reverse">
                                            <div className="w-full bg-emerald-600 rounded-t-sm" style={{ height: `${(m.earned / maxEarned) * 100}%` }}/>
                                        </div>
                                        <span className="text-[7px] font-black text-gray-700 mt-2 uppercase">{m.name}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TimeOffView = ({ leaves = [], holidays = [], totalLeaves, onAddLeave, onDeleteLeave, onUpdateHolidays, onUpdateTotalLeaves }) => {
            const [activeTab, setActiveTab] = useState('leaves');
            const [viewDate, setViewDate] = useState(new Date());
            const [isFiling, setIsFiling] = useState(false);
            const [formEntry, setFormEntry] = useState({ startDate: '', endDate: '', reason: '' });
            const now = new Date();
            const cycleStartYear = now.getMonth() >= 6 ? now.getFullYear() : now.getFullYear() - 1;
            const cycleStart = new Date(cycleStartYear, 6, 1);
            const monthsPassed = (now.getFullYear() - cycleStartYear) * 12 + now.getMonth() - 6 + 1;
            const accrued = Math.max(0, Math.min(totalLeaves, (monthsPassed * 2) - (24 - totalLeaves)));
            const cycleLeaves = (leaves || []).filter(l => parseLocalDate(l.startDate) >= cycleStart);
            const used = cycleLeaves.reduce((s, l) => s + (l.days || 0), 0);
            const weeks = useMemo(() => {
                const startM = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
                const startD = new Date(startM); startD.setDate(startD.getDate() - startD.getDay());
                const w = []; let iter = new Date(startD);
                for(let i=0; i<6; i++){ let r = []; for(let j=0; j<7; j++){ r.push(new Date(iter)); iter.setDate(iter.getDate()+1); } w.push(r); }
                return w;
            }, [viewDate]);
            const submitEntry = () => {
                const s = parseLocalDate(formEntry.startDate); 
                const e = activeTab === 'leaves' ? parseLocalDate(formEntry.endDate || formEntry.startDate) : s;
                if(!s || s > e) return;
                if (activeTab === 'leaves') {
                    let days = 0; let cur = new Date(s); while(cur <= e){ if(cur.getDay()!==0 && cur.getDay()!==6) days++; cur.setDate(cur.getDate()+1); }
                    onAddLeave({ id: crypto.randomUUID(), ...formEntry, endDate: formEntry.endDate || formEntry.startDate, days });
                } else {
                    onUpdateHolidays([...(holidays || []), { id: crypto.randomUUID(), name: formEntry.reason || 'Holiday', month: s.getMonth() + 1, day: s.getDate(), color: '#eab308', iconName: 'Star' }]);
                }
                setIsFiling(false); setFormEntry({ startDate: '', endDate: '', reason: '' });
            };
            return (
                <div className="flex flex-col lg:flex-row h-full overflow-y-auto lg:overflow-hidden bg-gray-950 custom-scrollbar safe-area-bottom">
                    <div className="w-full lg:w-80 border-r border-gray-800 p-4 shrink-0 overflow-y-auto custom-scrollbar min-h-[400px]">
                        <div className="bg-gray-900 border border-gray-800 rounded-2xl p-4 shadow-xl mb-6 text-center text-white">
                            <h2 className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Leave Status</h2>
                            <div className="grid grid-cols-2 gap-2"><div><p className="text-xl font-bold text-blue-400">{accrued}</p><p className="text-[8px] text-gray-600 uppercase">Accrued</p></div><div><p className="text-xl font-bold text-emerald-400">{Math.max(0, accrued - used)}</p><p className="text-[8px] text-gray-600 uppercase">Left</p></div></div>
                        </div>
                        <div className="flex gap-2 mb-4 bg-gray-900 p-1 rounded-xl">
                            <button onClick={()=>setActiveTab('leaves')} className={`flex-1 py-1.5 text-[10px] font-bold rounded-lg transition-all ${activeTab==='leaves'?'bg-blue-600 text-white shadow-lg':'text-gray-500'}`}>LEAVES</button>
                            <button onClick={()=>setActiveTab('holidays')} className={`flex-1 py-1.5 text-[10px] font-bold rounded-lg transition-all ${activeTab==='holidays'?'bg-yellow-600 text-white shadow-lg':'text-gray-500'}`}>HOLIDAYS</button>
                        </div>
                        {isFiling && (
                            <div className="space-y-2 bg-gray-900 p-4 rounded-xl border border-gray-800 mb-4 fade-in">
                                <div className="space-y-1"><label className="text-[8px] text-gray-500 font-bold uppercase">Start Date</label><input type="date" className="w-full bg-gray-950 border border-gray-800 rounded p-2 text-xs text-white" value={formEntry.startDate} onChange={e=>setFormEntry({...formEntry, startDate:e.target.value})}/></div>
                                {activeTab === 'leaves' && <div className="space-y-1"><label className="text-[8px] text-gray-500 font-bold uppercase">End Date</label><input type="date" className="w-full bg-gray-950 border border-gray-800 rounded p-2 text-xs text-white" value={formEntry.endDate} onChange={e=>setFormEntry({...formEntry, endDate:e.target.value})}/></div>}
                                <input placeholder="Description..." className="w-full bg-gray-950 border border-gray-800 rounded p-2 text-xs text-white" value={formEntry.reason} onChange={e=>setFormEntry({...formEntry, reason:e.target.value})}/>
                                <button onClick={submitEntry} className="w-full py-2 bg-blue-600 rounded-lg font-bold text-xs text-white">Save</button>
                            </div>
                        )}
                        <div className="space-y-2">
                            {(activeTab==='leaves' ? (cycleLeaves || []) : (holidays || [])).map(item=>(
                                <div key={item.id} className="p-3 bg-gray-900 border border-gray-800 rounded-xl flex justify-between items-center group shadow-sm"><div className="min-w-0 pr-2"><p className="text-[10px] font-bold text-white truncate">{item.reason || item.name}</p><p className="text-[8px] text-gray-600">{item.startDate || `${item.month}/${item.day}`}</p></div><button onClick={()=>activeTab==='leaves' ? onDeleteLeave(item.id) : onUpdateHolidays(holidays.filter(x=>x.id!==item.id))} className="text-red-500 opacity-0 group-hover:opacity-100 transition"><Trash2 size={12}/></button></div>
                            ))}
                        </div>
                    </div>
                    <div className="flex-1 flex flex-col p-6 overflow-hidden min-h-[600px] tablet-scroll">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold text-white">{viewDate.toLocaleString('default', { month: 'long', year: 'numeric' })}</h2>
                            <div className="flex gap-1 bg-gray-900 p-1 rounded-xl shadow-lg border border-gray-800"><button onClick={()=>setViewDate(new Date(viewDate.setMonth(viewDate.getMonth()-1)))} className="p-1 hover:bg-gray-800 rounded text-white transition"><ChevronLeft/></button><button onClick={()=>setViewDate(new Date())} className="px-4 text-[10px] font-bold text-gray-400 hover:text-white uppercase tracking-widest transition">Today</button><button onClick={()=>setViewDate(new Date(viewDate.setMonth(viewDate.getMonth()+1)))} className="p-1 hover:bg-gray-800 rounded text-white transition"><ChevronRight/></button></div>
                        </div>
                        <div className="flex-1 grid grid-rows-6 border border-gray-800 rounded-3xl overflow-hidden bg-gray-900/20 shadow-2xl">
                            <div className="grid grid-cols-7 bg-gray-900 border-b border-gray-800">{['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} className="text-[10px] font-bold text-gray-600 text-center py-3 tracking-widest uppercase">{d}</div>)}</div>
                            {weeks.map((week, wIdx) => (
                                <div key={wIdx} className="grid grid-cols-7 border-b border-gray-800 last:border-0">
                                    {week.map((day, dIdx) => {
                                        const isOther = day.getMonth() !== viewDate.getMonth(); const isToday = day.toDateString() === new Date().toDateString(); const isWeekend = dIdx === 0 || dIdx === 6;
                                        const holiday = (holidays || []).find(h => h.month === (day.getMonth()+1) && h.day === day.getDate());
                                        const leave = (leaves || []).find(l => { const s=parseLocalDate(l.startDate); const e=parseLocalDate(l.endDate || l.startDate); if(!s || !e) return false; s.setHours(0,0,0,0); e.setHours(23,59,59,999); return day >= s && day <= e; });
                                        return (
                                            <div key={dIdx} onClick={() => { setFormEntry({ startDate: formatDate(day), endDate: formatDate(day), reason: '' }); setIsFiling(true); }} className={`p-2 border-r border-gray-800/30 last:border-0 relative cursor-pointer group ${isOther?'opacity-20':''} ${isToday?'bg-blue-500/10':''} ${isWeekend?'bg-gray-950/40':''} hover:bg-gray-800/40 transition-colors`}>
                                                <span className={`text-[10px] font-bold ${isToday?'text-blue-400':'text-gray-700'}`}>{day.getDate()}</span>
                                                <div className="mt-1 space-y-1">{holiday && <div className="h-1.5 bg-yellow-500/50 rounded" title={holiday.name} />}{leave && <div className="h-1.5 bg-red-500/50 rounded" title={leave.reason} />}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const ListManager = ({ isOpen, onClose, onUpdateLists, initialClients, allData, onImport }) => {
            const [clientForm, setClientForm] = useState({ name: '', mode: 'per_shot', defaultRate: 0 });
            const [editIdx, setEditIdx] = useState(null);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 p-4">
                    <div className="bg-gray-900 border border-gray-800 w-full max-w-2xl rounded-3xl h-[600px] flex flex-col overflow-hidden shadow-2xl">
                        <div className="flex border-b border-gray-800"><div className="flex-1 py-4 text-[10px] font-bold tracking-widest text-white text-center uppercase">CLIENTS & DATABASE</div><button onClick={onClose} className="px-6 text-gray-500 hover:text-white transition"><X/></button></div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                            <div className="grid grid-cols-2 gap-4 bg-gray-950 p-4 rounded-2xl border border-gray-800 shadow-lg text-white">
                                <input className="bg-gray-900 border border-gray-800 rounded-xl p-3 text-sm outline-none focus:border-blue-500" placeholder="Client Name" value={clientForm.name} onChange={e=>setClientForm({...clientForm, name:e.target.value})} />
                                <select className="bg-gray-900 border border-gray-800 rounded-xl p-3 text-sm outline-none" value={clientForm.mode} onChange={e=>setClientForm({...clientForm, mode:e.target.value})}><option value="per_shot">Per Shot</option><option value="fixed">Monthly Fixed</option></select>
                                {clientForm.mode==='fixed' && <input type="number" className="col-span-2 bg-gray-900 border border-gray-800 rounded-xl p-3 text-sm outline-none focus:border-blue-500" placeholder="Monthly Rate" value={clientForm.defaultRate} onChange={e=>setClientForm({...clientForm, defaultRate:e.target.value})} />}
                                <button className="col-span-2 bg-blue-600 py-3 rounded-xl font-bold text-xs shadow-lg hover:bg-blue-500 transition" onClick={()=>{ const list = [...(initialClients || [])]; if(editIdx !== null) list[editIdx] = clientForm; else list.push(clientForm); onUpdateLists(list); setClientForm({name:'', mode:'per_shot', defaultRate:0}); setEditIdx(null); }}>{editIdx !== null ? 'UPDATE CLIENT' : 'ADD CLIENT'}</button>
                            </div>
                            <div className="space-y-2">
                                {(initialClients || []).map((c, i) => (
                                    <div key={i} className="flex justify-between items-center p-4 bg-gray-800/30 border border-gray-800 rounded-2xl hover:border-gray-600 transition">
                                        <div><p className="font-bold text-white text-sm">{c.name}</p><p className="text-[10px] text-gray-600 uppercase tracking-widest">{c.mode} {c.mode==='fixed' && `($${c.defaultRate})`}</p></div>
                                        <div className="flex gap-2"><button onClick={()=>{setClientForm(c); setEditIdx(i);}} className="text-gray-400 hover:text-white transition p-2 bg-gray-800 rounded-lg"><Edit2 size={16}/></button><button onClick={()=>onUpdateLists(initialClients.filter((_,idx)=>idx!==i))} className="text-red-500 transition p-2 bg-gray-800 rounded-lg hover:bg-red-500/10"><Trash2 size={16}/></button></div>
                                    </div>
                                ))}
                            </div>
                            <div className="border-t border-gray-800 pt-6 flex gap-4">
                                <button onClick={()=>{const b=new Blob([JSON.stringify(allData)],{type:'application/json'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download='animtrack_backup.json'; a.click();}} className="bg-emerald-600/10 text-emerald-500 border border-emerald-500/20 px-6 py-3 rounded-2xl font-bold text-xs flex-1 hover:bg-emerald-600/20 transition flex items-center justify-center gap-2"><Download size={14}/> EXPORT</button>
                                <button onClick={()=>{ const input=document.createElement('input'); input.type='file'; input.accept='.json'; input.onchange=e=>{ const f=e.target.files[0]; const reader=new FileReader(); reader.onload=ev=>{ onImport(JSON.parse(ev.target.result)); onClose(); }; reader.readAsText(f); }; input.click(); }} className="bg-blue-600/10 text-blue-500 border border-blue-500/20 px-6 py-3 rounded-2xl font-bold text-xs flex-1 hover:bg-blue-600/20 transition flex items-center justify-center gap-2"><Upload size={14}/> IMPORT</button>
                            </div>
                            <div className="border-t border-gray-800 pt-6">
                                <button onClick={() => { safeRemoveStorage(GITHUB_TOKEN_KEY); window.location.reload(); }} className="w-full bg-red-500/10 text-red-500 border border-red-500/20 px-6 py-3 rounded-2xl font-bold text-xs hover:bg-red-500/20 transition flex items-center justify-center gap-2">LOGOUT (REMOVE DEVICE KEY)</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProjectCard = ({ p, clients, showRates, onEdit, onSelect, onAdvance, onRevision, onUpdate }) => {
            const val = calculateTicketValue(p, clients);
            const now = new Date(); const start = parseLocalDate(p.startDate || p.createdAt); const deadline = parseLocalDate(p.deadline);
            let deadlineProg = 0; let isOverdue = false;
            if (start && deadline && !['paid', 'completed'].includes(p.status)) { 
                const total = deadline.getTime() - start.getTime(); 
                deadlineProg = Math.max(0, Math.min(100, ((now.getTime() - start.getTime()) / total) * 100)); 
                if (now > deadline) isOverdue = true; 
            }
            return (
                <div onClick={onSelect} className={`bg-gray-900 border p-5 rounded-3xl min-w-[300px] shrink-0 space-y-4 transition group cursor-pointer shadow-xl relative active:scale-95 ${isOverdue ? 'border-red-900/50 hover:border-red-500 shadow-red-900/10' : 'border-gray-800 hover:border-gray-600'}`}>
                    <div className="flex justify-between items-start"><div className="min-w-0 pr-4"><p className="text-[10px] font-bold text-blue-500 uppercase truncate tracking-widest">{p.client}</p><h4 className="text-base font-bold text-white truncate mt-1 leading-tight">{p.name}</h4></div>
                        <div className="flex gap-1 shrink-0">
                            <button onClick={(e)=>{e.stopPropagation(); onRevision(p);}} className="p-2 bg-yellow-600/20 rounded-xl text-yellow-400 hover:bg-yellow-600/40 transition"><Zap size={14}/></button>
                            <button onClick={(e)=>{e.stopPropagation(); onAdvance(p);}} className="p-2 bg-blue-600/20 rounded-xl text-blue-400 hover:bg-blue-600/40 transition"><ArrowRight size={14}/></button>
                            <button onClick={(e)=>{e.stopPropagation(); onEdit(p);}} className="p-2 bg-gray-800 rounded-xl text-gray-500 hover:text-white transition"><Edit2 size={14}/></button>
                        </div>
                    </div>
                    <div className="flex justify-between items-center"><div className={`text-[8px] font-black uppercase px-2 py-0.5 rounded-full border ${getStatusStyles(p.status)}`}>{p.status}</div>{isOverdue && <div className="text-[8px] font-black uppercase px-2 py-0.5 rounded-full bg-red-600 text-white animate-pulse">Overdue</div>}<div className="text-xs font-mono font-bold text-white/90">{showRates ? `$${val.toLocaleString()}` : '****'}</div></div>
                    <div className="space-y-3">
                        <div className="space-y-1">
                            <div className="flex justify-between text-[8px] text-gray-500 uppercase font-bold"><span>Progress</span><span>{p.progress||0}%</span></div>
                            <input 
                                type="range" 
                                onClick={e=>e.stopPropagation()} 
                                onPointerDown={e=>e.stopPropagation()} 
                                onChange={e=>onUpdate(p.id, {progress: e.target.value})} 
                                className="cursor-pointer" 
                                value={p.progress || 0}
                                style={{
                                    background: `linear-gradient(to right, #3b82f6 0%, #3b82f6 ${p.progress || 0}%, #1f2937 ${p.progress || 0}%, #1f2937 100%)`
                                }}
                            />
                        </div>
                        {deadline && !['paid', 'completed'].includes(p.status) && (<div className="space-y-1"><div className="flex justify-between text-[8px] text-gray-500 uppercase font-bold"><span>Deadline Tracker</span><span className={isOverdue ? 'text-red-500 font-black' : 'text-gray-400'}>{isOverdue ? 'OVERDUE' : formatDate(deadline)}</span></div><div className="w-full bg-gray-800 h-1 rounded-full overflow-hidden shadow-inner"><div className={`h-full transition-all duration-500 ${isOverdue ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.4)]' : 'bg-gray-600'}`} style={{width:`${deadlineProg}%`}}/></div></div>)}
                    </div>
                </div>
            );
        };

        const ProjectModal = ({ isOpen, onClose, onSave, onDelete, initialData, clients }) => {
            const [form, setForm] = useState({});
            const selectedClient = (clients || []).find(c => c.name === form.client);
            useEffect(() => {
                if(isOpen) {
                    if(initialData) setForm({...initialData});
                    else setForm({ name: '', client: (clients && clients[0]?.name) || '', status: 'inquiry', progress: 0, shotRate: 0, shotCount: 1, fixedPrice: 0, startDate: formatDate(new Date()), deadline: formatDate(new Date()) });
                }
            }, [isOpen, initialData, clients]);
            if(!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 p-4">
                    <div className="bg-gray-950 border border-gray-800 w-full max-w-lg rounded-3xl p-8 shadow-2xl space-y-6">
                        <div className="flex justify-between items-center text-white"><h2 className="text-2xl font-bold">{initialData?'Edit Ticket':'New Ticket'}</h2><button onClick={onClose}><X/></button></div>
                        <div className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1"><label className="text-[10px] font-bold text-gray-600 uppercase ml-1">Client</label><select className="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 text-white text-sm outline-none focus:border-blue-500" value={form.client} onChange={e=>setForm({...form, client:e.target.value})}>{(clients || []).map(c=><option key={c.name} value={c.name}>{c.name}</option>)}</select></div>
                                <div className="space-y-1"><label className="text-[10px] font-bold text-gray-600 uppercase ml-1">Status</label><select className="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 text-white text-sm outline-none focus:border-blue-500" value={form.status} onChange={e=>setForm({...form, status:e.target.value})}>{STATUS_FLOW.map(s => <option key={s} value={s}>{s.toUpperCase()}</option>)}</select></div>
                            </div>
                            {selectedClient?.mode !== 'fixed' ? (
                                <div className="grid grid-cols-2 gap-4 bg-gray-900 p-4 rounded-2xl border border-gray-800 shadow-inner text-white"><div className="space-y-1"><label className="text-[10px] font-bold text-gray-600 uppercase ml-1">Rate</label><input type="number" className="w-full bg-gray-950 rounded-xl p-2 text-white text-sm outline-none" value={form.shotRate} onChange={e=>setForm({...form, shotRate:e.target.value})}/></div><div className="space-y-1"><label className="text-[10px] font-bold text-gray-600 uppercase ml-1">Shots</label><input type="number" className="w-full bg-gray-950 rounded-xl p-2 text-white text-sm outline-none" value={form.shotCount} onChange={e=>setForm({...form, shotCount:e.target.value})}/></div></div>
                            ) : <div className="bg-gray-900 p-4 rounded-2xl border border-gray-800 text-center shadow-inner"><p className="text-[10px] font-bold text-gray-600 uppercase tracking-widest">Monthly Rate</p><p className="text-xl font-mono text-emerald-400 font-bold mt-1">${selectedClient.defaultRate}</p></div>}
                            <input className="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 text-white text-sm outline-none focus:border-blue-500" placeholder="Name" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} />
                            <div className="grid grid-cols-2 gap-4"><input type="date" className="bg-gray-900 rounded-xl p-3 text-white text-xs outline-none focus:border-blue-500" value={form.startDate} onChange={e=>setForm({...form, startDate:e.target.value})} /><input type="date" className="bg-gray-900 rounded-xl p-3 text-white text-xs outline-none focus:border-blue-500" value={form.deadline} onChange={e=>setForm({...form, deadline:e.target.value})} /></div>
                            <div className="flex gap-3 pt-4">{initialData && <button onClick={()=>{onDelete(initialData.id); onClose();}} className="bg-red-500/10 text-red-500 px-6 py-3 rounded-xl font-bold text-xs transition border border-red-500/20 hover:bg-red-500/20">DELETE</button>}<button onClick={()=>{onSave(form); onClose();}} className="flex-1 bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-xs shadow-lg hover:bg-blue-500 transition">SAVE</button></div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProjectDetails = ({ project, onClose, onUpdate, onEdit, onAdvance, onRevert, onRevision }) => (
            <div className="fixed inset-0 z-50 flex justify-end">
                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose} />
                <div className="relative w-full max-w-2xl bg-gray-950 h-full border-l border-gray-800 shadow-2xl flex flex-col animate-slide-left">
                    <div className="p-6 border-b border-gray-800 flex justify-between items-center bg-gray-900">
                        <div><h2 className="text-2xl font-bold text-white leading-tight">{project.name}</h2><p className="text-blue-400 text-xs font-bold uppercase tracking-widest mt-1">{project.client}</p></div>
                        <div className="flex gap-3"><button onClick={onEdit} className="p-2.5 bg-gray-800 rounded-xl text-gray-400 hover:text-white transition shadow-sm"><Edit2 size={18}/></button><button onClick={onClose} className="p-2.5 bg-gray-800 rounded-xl text-gray-400 hover:text-white transition shadow-sm"><X size={18}/></button></div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                        <div className="bg-gray-900 p-6 rounded-3xl border border-gray-800 shadow-inner">
                            <div className="flex justify-between items-center mb-2"><span className="text-xs font-bold text-gray-500 uppercase tracking-widest">Workflow Step</span><div className="flex gap-2">
                                <button onClick={()=>onRevert(project)} className="text-[10px] font-bold text-orange-400 flex items-center hover:underline uppercase transition"><RotateCcw size={10} className="mr-1"/> Revert</button>
                                <button onClick={()=>onRevision(project)} className="text-[10px] font-bold text-yellow-400 flex items-center hover:underline uppercase transition"><Zap size={10} className="mr-1"/> Revision</button>
                                <button onClick={()=>onAdvance(project)} className="text-[10px] font-bold text-blue-500 flex items-center hover:underline uppercase transition">Advance <ArrowRight size={10} className="ml-1"/></button>
                            </div></div>
                            <select className="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-white text-sm mb-4 outline-none focus:border-blue-500 shadow-inner" value={project.status} onChange={(e)=>onUpdate(project.id, {status: e.target.value})}>
                                {STATUS_FLOW.map(s => <option key={s} value={s}>{s.toUpperCase()}</option>)}
                            </select>
                            <div className="flex justify-between items-center mb-4 uppercase text-[10px] font-bold text-gray-500 tracking-widest">Progress: {project.progress || 0}%</div>
                            <input 
                                type="range" 
                                className="w-full h-2 bg-gray-800 rounded-lg accent-blue-500 cursor-pointer" 
                                value={project.progress || 0} 
                                onChange={(e)=>onUpdate(project.id, {progress: e.target.value})} 
                                style={{
                                    background: `linear-gradient(to right, #3b82f6 0%, #3b82f6 ${project.progress || 0}%, #1f2937 ${project.progress || 0}%, #1f2937 100%)`
                                }}
                            />
                        </div>
                        <div className="space-y-2"><label className="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1 opacity-70 uppercase">Production Notes</label><RichTextEditor value={project.notes || ''} onChange={(html)=>onUpdate(project.id, {notes: html})} /></div>
                    </div>
                </div>
            </div>
        );

        function App() {
            // --- UI State ---
            const [githubToken, setGithubToken] = useState(safeGetStorage(GITHUB_TOKEN_KEY) || '');
            const [tokenInput, setTokenInput] = useState('');
            const [isAuthenticating, setIsAuthenticating] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);

            const [data, setData] = useState({ projects: [], clients: [], holidays: [], leaves: [], totalLeaves: 22 });
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('board');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isListOpen, setIsListOpen] = useState(false);
            const [activeProject, setActiveProject] = useState(null);
            const [editingProject, setEditingProject] = useState(null);
            const [showRates, setShowRates] = useState(true);
            const [currentDate, setCurrentDate] = useState(new Date());
            
            const isFirstMount = useRef(true);

            // --- Manual Sync Button Function ---
            const forcePullFromCloud = async () => {
                if (!githubToken) return;
                setIsSyncing(true);
                const cloudData = await fetchCloudData();
                if (cloudData) setData(cloudData);
                setTimeout(() => setIsSyncing(false), 800);
            };

            // --- Initialization ---
            useEffect(() => {
                if (!githubToken) return;

                const initData = async () => {
                    const cloudData = await fetchCloudData();
                    if (cloudData) {
                        setData(cloudData);
                    } else {
                        setData(loadLocalData());
                    }
                    setLoading(false);
                    setTimeout(() => { isFirstMount.current = false; }, 1000); // Lock auto-saves during boot
                };
                initData(); 
            }, [githubToken]);

            // --- Auto-Save on Data Change ---
            useEffect(() => { 
                if (isFirstMount.current) return;
                if (!loading && githubToken) saveCloudData(data); 
            }, [data, loading, githubToken]);

            const statusGroups = useMemo(() => {
                const g = { active: [], completed: [], paid: [] };
                (data.projects || []).forEach(p => {
                    if(p.status === 'paid') g.paid.push(p);
                    else if(p.status === 'completed') g.completed.push(p);
                    else g.active.push(p);
                });
                return g;
            }, [data.projects]);

            const groupedArchive = useMemo(() => {
                const groups = {};
                statusGroups.paid.forEach(p => {
                    const date = parseLocalDate(p.paymentDate || p.createdAt) || new Date();
                    const key = date.toLocaleString('default', { month: 'long', year: 'numeric' });
                    if (!groups[key]) groups[key] = []; groups[key].push(p);
                });
                return Object.fromEntries(Object.entries(groups).sort((a, b) => new Date(b[0]) - new Date(a[0])));
            }, [statusGroups.paid]);

            const groupedDone = useMemo(() => {
                const groups = {};
                statusGroups.completed.forEach(p => { if (!groups[p.client]) groups[p.client] = []; groups[p.client].push(p); });
                return groups;
            }, [statusGroups.completed]);

            const handleUpdateLists = (l) => setData(prev => ({ ...prev, clients: l }));
            const handleAddLeave = (l) => setData(prev => ({ ...prev, leaves: [...(prev.leaves || []), l] }));
            const handleDeleteLeave = (id) => setData(prev => ({ ...prev, leaves: (prev.leaves || []).filter(x=>x.id!==id) }));
            const handleUpdateHolidays = (h) => setData(prev => ({ ...prev, holidays: h }));
            const handleUpdateTotalLeaves = (v) => setData(prev => ({ ...prev, totalLeaves: v }));
            
            const handleImport = (d) => { 
                if(d && d.projects) {
                    setData(d); 
                    saveCloudData(d); // Force push immediately upon import
                }
            };

            const handleSaveProject = (p) => {
                setData(prev => {
                    const isPaid = p.status === 'paid'; const isCompleted = p.status === 'completed';
                    const projects = prev.projects || [];
                    const list = editingProject ? projects.map(x=>x.id===p.id?{...x, ...p, paymentDate: (isPaid && !x.paymentDate) ? formatDate(new Date()) : x.paymentDate, completionDate: (isCompleted && !x.completionDate) ? formatDate(new Date()) : x.completionDate }:x) : [...projects, {...p, id:crypto.randomUUID(), paymentDate: isPaid ? formatDate(new Date()) : '', completionDate: isCompleted ? formatDate(new Date()) : ''}];
                    return { ...prev, projects: list };
                });
            };

            const handleAdvanceStage = (p) => {
                setData(prev => {
                    const projects = (prev.projects || []).map(x => {
                        if (x.id === p.id) {
                            const curIdx = STATUS_FLOW.indexOf(x.status);
                            const nextStatus = STATUS_FLOW[Math.min(curIdx + 1, STATUS_FLOW.length - 1)];
                            const updates = { status: nextStatus };
                            if (nextStatus === 'completed' && !x.completionDate) updates.completionDate = formatDate(new Date());
                            if (nextStatus === 'paid' && !x.paymentDate) updates.paymentDate = formatDate(new Date());
                            return { ...x, ...updates };
                        }
                        return x;
                    });
                    return { ...prev, projects };
                });
            };

            const handleRevisionNeeded = (p) => {
                setData(prev => {
                    const projects = (prev.projects || []).map(x => (x.id === p.id) ? { ...x, status: 'revision', paymentDate: '', completionDate: '' } : x);
                    return { ...prev, projects };
                });
            };

            const handleRevertStage = (p) => {
                setData(prev => {
                    const projects = (prev.projects || []).map(x => {
                        if (x.id === p.id) {
                            const curIdx = STATUS_FLOW.indexOf(x.status);
                            const nextStatus = STATUS_FLOW[Math.max(0, curIdx - 1)];
                            return { ...x, status: nextStatus, paymentDate: '', completionDate: '' };
                        }
                        return x;
                    });
                    return { ...prev, projects };
                });
            };

            const handleSaveToken = async () => {
                if (!tokenInput.trim()) return;
                setIsAuthenticating(true);
                const token = tokenInput.trim();
                safeSetStorage(GITHUB_TOKEN_KEY, token);
                
                try {
                    const res = await fetch('https://api.github.com/gists', {
                        headers: { Authorization: `token ${token}` }
                    });
                    
                    if (res.ok) {
                        const gists = await res.json();
                        const existingGist = gists.find(g => g.files && g.files[GIST_FILENAME]);
                        if (existingGist) safeSetStorage(LOCAL_GIST_KEY, existingGist.id);
                    }
                } catch (e) { console.error("Could not scan for existing gists.", e); }
                
                setGithubToken(token);
                setIsAuthenticating(false);
            };

            // --- The Authentication Screen ---
            if (!githubToken) {
                return (
                    <div className="fixed inset-0 bg-gray-950 flex flex-col items-center justify-center p-4">
                        <div className="bg-gray-900 border border-gray-800 p-8 rounded-3xl max-w-md w-full shadow-2xl space-y-6 fade-in">
                            <div className="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-2 border border-blue-500/20 shadow-inner">
                                {isAuthenticating ? <RotateCcw className="text-blue-500 animate-spin" size={32} /> : <CheckCircle className="text-blue-500" size={32} />}
                            </div>
                            <h2 className="text-2xl font-bold text-white text-center">Secure Cloud Sync</h2>
                            <p className="text-gray-400 text-sm text-center">Enter your Fine-Grained GitHub PAT. We will scan your account to link your existing data.</p>
                            
                            <div className="space-y-2">
                                <input 
                                    type="password" 
                                    value={tokenInput}
                                    onChange={e => setTokenInput(e.target.value)}
                                    disabled={isAuthenticating}
                                    className="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-white text-sm outline-none focus:border-blue-500 text-center font-mono disabled:opacity-50" 
                                    placeholder="ghp_xxxxxxxxxxxxxxxxx" 
                                    onKeyDown={e => { if(e.key === 'Enter') handleSaveToken(); }}
                                />
                            </div>

                            <button onClick={handleSaveToken} disabled={isAuthenticating} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold text-sm shadow-lg transition disabled:opacity-50">
                                {isAuthenticating ? 'Scanning GitHub...' : 'Authenticate & Sync'}
                            </button>
                        </div>
                    </div>
                );
            }

            if (loading) return null;

            return (
                <div className="fixed inset-0 bg-gray-950 flex flex-col">
                    <header className="h-16 bg-gray-900/80 backdrop-blur-xl border-b border-gray-800 flex items-center justify-between px-6 z-40">
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3"><Box className="text-blue-500" size={24}/><h1 className="text-lg font-black text-white uppercase tracking-widest">ANIM<span className="text-blue-500">TRACK</span></h1></div>
                            <div className="flex bg-gray-950/50 p-1 rounded-2xl border border-gray-800 shadow-inner">
                                <button onClick={()=>setView('board')} className={`p-2 px-4 rounded-xl transition ${view==='board'?'bg-gray-800 text-white shadow-xl':'text-gray-500 hover:text-gray-400'}`}><LayoutGrid size={16}/></button>
                                <button onClick={()=>setView('calendar')} className={`p-2 px-4 rounded-xl transition ${view==='calendar'?'bg-gray-800 text-white shadow-xl':'text-gray-500 hover:text-gray-400'}`}><CalendarDays size={16}/></button>
                                <button onClick={()=>setView('stats')} className={`p-2 px-4 rounded-xl transition ${view==='stats'?'bg-gray-800 text-white shadow-xl':'text-gray-500 hover:text-gray-400'}`}><BarChart2 size={16}/></button>
                                <button onClick={()=>setView('leaves')} className={`p-2 px-4 rounded-xl transition ${view==='leaves'?'bg-gray-800 text-white shadow-xl':'text-gray-500 hover:text-gray-400'}`}><Umbrella size={16}/></button>
                            </div>
                        </div>
                        {view === 'calendar' && (
                            <div className="flex items-center gap-3 bg-gray-950/80 px-2 py-1 rounded-2xl border border-gray-800 shadow-lg">
                                <button onClick={()=>setCurrentDate(prev => { const d = new Date(prev); d.setMonth(d.getMonth()-1); return d; })} className="p-1.5 hover:bg-gray-800 rounded-lg text-gray-500 transition"><ChevronLeft size={18}/></button>
                                <span className="text-[10px] font-black uppercase text-gray-200 min-w-[120px] text-center tracking-widest">{currentDate.toLocaleString('default', { month: 'long', year: 'numeric' })}</span>
                                <button onClick={()=>setCurrentDate(prev => { const d = new Date(prev); d.setMonth(d.getMonth()+1); return d; })} className="p-1.5 hover:bg-gray-800 rounded-lg text-gray-500 transition"><ChevronRight size={18}/></button>
                            </div>
                        )}
                        <div className="flex items-center gap-2">
                            <button onClick={()=>setShowRates(!showRates)} className="w-10 h-10 flex items-center justify-center bg-gray-800/50 border border-gray-700 rounded-2xl text-gray-400 hover:text-white transition shadow-sm">{showRates?<Eye size={18}/>:<EyeOff size={18}/>}</button>
                            <button onClick={forcePullFromCloud} className="w-10 h-10 flex items-center justify-center bg-gray-800/50 border border-gray-700 rounded-2xl text-blue-400 hover:text-white transition shadow-sm" title="Pull Latest from Cloud">
                                <Download size={18} className={isSyncing ? 'animate-bounce' : ''} />
                            </button>
                            <button onClick={()=>setIsListOpen(true)} className="w-10 h-10 flex items-center justify-center bg-gray-800/50 border border-gray-700 rounded-2xl text-gray-400 hover:text-white transition shadow-sm"><Settings size={18}/></button>
                            <button onClick={()=>{setEditingProject(null); setIsModalOpen(true);}} className="bg-blue-600 hover:bg-blue-500 text-white h-10 px-5 ml-1 rounded-2xl flex items-center shadow-lg transition font-bold uppercase text-[10px] tracking-widest">New Ticket</button>
                        </div>
                    </header>
                    <main className="flex-1 relative overflow-hidden bg-gray-950">
                        {view === 'board' && (
                            <div className="h-full overflow-y-auto p-6 space-y-8 custom-scrollbar">
                                <div className="space-y-4">
                                    <div className="flex items-center gap-3 border-b border-gray-800/50 pb-2 uppercase text-[10px] font-black text-gray-500 tracking-widest">In Progress</div>
                                    <div className="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                                        {statusGroups.active.map(p => (
                                            <ProjectCard 
                                                key={p.id} 
                                                p={p} 
                                                clients={data.clients} 
                                                showRates={showRates} 
                                                onEdit={(proj)=>{setEditingProject(proj); setIsModalOpen(true);}} 
                                                onSelect={()=>setActiveProject(p)} 
                                                onAdvance={handleAdvanceStage} 
                                                onRevision={handleRevisionNeeded}
                                                onUpdate={(id, up)=>setData(prev => ({...prev, projects: (prev.projects || []).map(x=>x.id===id?{...x, ...up}:x)}))}
                                            />
                                        ))}
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex items-center gap-3 border-b border-gray-800/50 pb-2 uppercase text-[10px] font-black text-gray-500 tracking-widest text-yellow-500">Done / Pending Pay</div>
                                    <div className="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                                        {Object.entries(groupedDone).map(([client, items]) => (
                                            <div key={client} className="bg-gray-900 border border-gray-800 p-5 rounded-3xl min-w-[300px] shrink-0 space-y-4 hover:border-gray-600 transition shadow-xl relative overflow-hidden text-white">
                                                <div className="flex items-center gap-2 border-b border-gray-800 pb-2"><Briefcase size={12} className="text-yellow-500"/><h4 className="text-[10px] font-black uppercase tracking-widest truncate">{client}</h4></div>
                                                <div className="space-y-2">
                                                    {items.map(item => (
                                                        <div key={item.id} className="flex justify-between items-center group/item hover:bg-gray-800/50 p-2 rounded-xl transition cursor-pointer" onClick={()=>setActiveProject(item)}>
                                                            <div className="min-w-0 pr-2"><p className="text-[11px] font-bold text-gray-300 truncate">{item.name}</p><p className="text-[9px] text-gray-500 font-mono tracking-tighter">{showRates ? `$${calculateTicketValue(item, data.clients).toLocaleString()}` : '****'}</p></div>
                                                            <div className="flex gap-1 opacity-0 group-hover/item:opacity-100 transition shrink-0">
                                                                <button onClick={(e)=>{e.stopPropagation(); handleRevertStage(item);}} className="p-1.5 bg-gray-800 rounded-lg text-orange-400 hover:bg-gray-700 transition"><RotateCcw size={12}/></button>
                                                                <button onClick={(e)=>{e.stopPropagation(); handleAdvanceStage(item);}} className="p-1.5 bg-gray-800 rounded-lg text-emerald-400 hover:bg-gray-700 transition"><ArrowRight size={12}/></button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex items-center gap-3 border-b border-gray-800/50 pb-2 uppercase text-[10px] font-black text-gray-500 tracking-widest text-emerald-500">Archive</div>
                                    <div className="space-y-6">
                                        {Object.entries(groupedArchive).map(([month, items]) => (
                                            <div key={month} className="space-y-2">
                                                <h4 className="text-[10px] font-black text-emerald-500/60 uppercase tracking-widest ml-1">{month}</h4>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
                                                    {items.map(p => (
                                                        <div key={p.id} onClick={()=>setActiveProject(p)} className="bg-gray-900 border border-gray-800 p-3 rounded-2xl flex justify-between items-center hover:border-gray-600 transition cursor-pointer shadow-md active:scale-95 text-white">
                                                            <div className="min-w-0 pr-2">
                                                                <p className="text-[9px] font-bold text-gray-500 uppercase truncate">{p.client}</p>
                                                                <h4 className="text-xs font-bold truncate leading-tight">{p.name}</h4>
                                                            </div>
                                                            <div className="text-right shrink-0"><span className="text-xs font-mono font-bold text-emerald-400">{showRates ? `$${calculateTicketValue(p, data.clients).toLocaleString()}` : '****'}</span></div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        {view === 'calendar' && <CalendarBoard projects={data.projects} currentDate={currentDate} onEdit={(p)=>{setEditingProject(p); setIsModalOpen(true);}} holidays={data.holidays} leaves={data.leaves} />}
                        {view === 'stats' && <StatisticsView projects={data.projects} clients={data.clients} leaves={data.leaves} totalLeaves={data.totalLeaves} showRates={showRates} />}
                        {view === 'leaves' && <TimeOffView leaves={data.leaves} holidays={data.holidays} totalLeaves={data.totalLeaves} onAddLeave={handleAddLeave} onDeleteLeave={handleDeleteLeave} onUpdateHolidays={handleUpdateHolidays} onUpdateTotalLeaves={handleUpdateTotalLeaves} />}
                    </main>
                    <ProjectModal isOpen={isModalOpen} onClose={()=>setIsModalOpen(false)} onSave={handleSaveProject} onDelete={(id)=>setData(prev=>({...prev, projects:(prev.projects || []).filter(x=>x.id!==id)}))} initialData={editingProject} clients={data.clients} />
                    <ListManager isOpen={isListOpen} onClose={()=>setIsListOpen(false)} onUpdateLists={handleUpdateLists} initialClients={data.clients} allData={data} onImport={handleImport} />
                    {activeProject && <ProjectDetails project={activeProject} onClose={()=>setActiveProject(null)} onEdit={()=>{ setEditingProject(activeProject); setIsModalOpen(true); setActiveProject(null); }} onAdvance={handleAdvanceStage} onRevert={handleRevertStage} onRevision={handleRevisionNeeded} onUpdate={(id, up)=>setData(prev => ({...prev, projects: (prev.projects || []).map(x=>x.id===id?{...x, ...up}:x)}))} />}
                </div>
            );
        }
        const root = createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
